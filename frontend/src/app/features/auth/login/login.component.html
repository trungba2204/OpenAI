<app-auth-layout title="Chào mừng trở lại" subtitle="Đăng nhập để tiếp tục trò chuyện với AI">
  @if (error) {
    <div class="auth-alert">
      <span>⚠️</span>
      <span>{{ error }}</span>
    </div>
  }

  <form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="ban@email.com"
          autocomplete="email"
          [class.invalid]="form.controls.email.touched && form.controls.email.invalid"
        />
      </div>
      @if (form.controls.email.touched && form.controls.email.hasError('email')) {
        <span class="form-error">Email không hợp lệ</span>
      }
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Mật khẩu</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input
          id="password"
          [type]="showPassword ? 'text' : 'password'"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
          [class.invalid]="form.controls.password.touched && form.controls.password.invalid"
        />
        <button type="button" class="toggle-pwd" (click)="showPassword = !showPassword" tabindex="-1">
          {{ showPassword ? '🙈' : '👁️' }}
        </button>
      </div>
    </div>

    <button type="submit" class="auth-submit" [disabled]="form.invalid || loading">
      @if (loading) {
        <span class="spinner"></span>
        Đang đăng nhập...
      } @else {
        Đăng nhập
      }
    </button>
  </form>

  <p class="auth-footer">
    Chưa có tài khoản?<a routerLink="/register">Đăng ký miễn phí</a>
  </p>
</app-auth-layout>
